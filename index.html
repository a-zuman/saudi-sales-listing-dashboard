<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saudi Sales | LFL Listing Performance</title>
  <style>
    :root{--bg:#f6f3ee;--panel:#fffaf2;--ink:#1e1d1b;--muted:#716b61;--line:#ded5c9;--accent:#123d35;--gold:#b68843;--good:#137a47;--bad:#a33a2b;--soft:#ece5da;--shadow:0 18px 45px rgba(32,27,19,.08);--radius:22px}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}.wrap{max-width:1280px;margin:0 auto;padding:34px 22px 54px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:24px}.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:10px}.title{font-size:34px;line-height:1.05;margin:0;font-weight:780;letter-spacing:-.04em}.sub{color:var(--muted);font-size:13px;margin-top:10px;line-height:1.45}.badge{background:var(--accent);color:white;border-radius:999px;padding:10px 14px;font-weight:750;font-size:13px;white-space:nowrap}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(4,1fr);margin-bottom:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.kpi{padding:20px}.kpi .label{color:var(--muted);font-size:13px}.kpi .value{font-size:32px;font-weight:800;letter-spacing:-.04em;margin:8px 0 6px}.kpi .meta{font-size:12px;color:var(--muted);line-height:1.55}.delta{font-weight:800}.delta.good{color:var(--good)}.delta.bad{color:var(--bad)}.section{padding:21px}.section h2{font-size:17px;margin:0 0 14px;letter-spacing:-.02em}.tablewrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:right;border-bottom:1px solid var(--line);padding:9px 8px;white-space:nowrap}.table th:first-child{text-align:left}.table td{font-size:13px;padding:11px 8px;border-bottom:1px solid #e9e0d4;text-align:right;white-space:nowrap}.table td:first-child{text-align:left;font-weight:700}.pills{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pills button,.pill{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:8px 11px;font-size:12px;color:var(--ink);font-weight:750}.pills button{cursor:pointer}.pills button.active{background:var(--accent);color:white;border-color:var(--accent)}.note{font-size:12px;color:var(--muted);line-height:1.5}.readout{font-size:19px;line-height:1.38;font-weight:750;letter-spacing:-.02em}.footer{margin-top:18px;color:var(--muted);font-size:12px;line-height:1.5}.loading{padding:24px}.warning{border-color:#d7aa65;background:#fff4df}
    @media(max-width:900px){.top{display:block}.badge{display:inline-block;margin-top:14px}.kpis{grid-template-columns:1fr}.kpi .value{font-size:28px}}
  </style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">Saudi Sales</div>
      <h1 class="title">Like-for-like listing performance</h1>
      <div class="sub" id="subtitle">Loading latest data…</div>
    </div>
    <div class="badge" id="reportDay">Weekly LFL view</div>
  </div>
  <div id="app" class="loading card">Loading dashboard data…</div>
  <div class="footer" id="footer"></div>
</main>
<script>
let DATA=null;let period='weekly';
function fmt(n,d=0){return Number(n||0).toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d})}
function sar(n){return 'SAR '+fmt(n,0)}
function moneyNum(s){return parseFloat(String(s).replace(/[^0-9.-]/g,''))||0}
function delta(actual,expected){if(expected==null)return'n/a';if(Number(expected)===0)return Number(actual)===0?'0%':'new';const v=(actual-expected)/expected*100;return(v>=0?'+':'')+v.toFixed(0)+'%'}
function dcls(actual,expected){if(expected==null)return'';if(Number(expected)===0)return Number(actual)>0?'good':'';return actual>=expected?'good':'bad'}
function latestWeek(){return DATA.weekly[DATA.weekly.length-1]}
function metricCard(title,value,metric,isMoney=false){const w=latestWeek(),y25=w.same_period&&w.same_period['2025'];const v25=y25?y25[metric]:null;const f=isMoney?sar:fmt;return `<div class="kpi card"><div class="label">${title}</div><div class="value">${value}</div><div class="meta">2025 same dates: ${v25==null?'n/a':f(v25)} | <span class="delta ${dcls(moneyNum(value),v25)}">${v25==null?'n/a':delta(moneyNum(value),v25)}</span></div></div>`}
function shortDate(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString(undefined,{day:'numeric',month:'short'})}
function runRateCard(){const rr=DATA.run_rate||{};const annual=rr.period_annualized_12m||0;const y25=rr.yearly_2025_revenue||0;const period=`${shortDate(rr.period_start)}–${shortDate(rr.period_end)}`;return `<div class="kpi card"><div class="label">Annual revenue run-rate</div><div class="value">${sar(annual)}</div><div class="meta">Current period ${period}: ${sar(rr.period_revenue)} over ${fmt(rr.period_days)} days<br>2025 full-year revenue: ${sar(y25)} | <span class="delta ${dcls(annual,y25)}">${y25?delta(annual,y25):'n/a'}</span></div></div>`}
function rowsForPeriod(){return period==='monthly'?DATA.monthly:DATA.weekly}
function compareCells(row,metric,isMoney=false){const f=isMoney?sar:fmt;const y25=row.same_period&&row.same_period['2025'];const val=row[metric];return `<td>${y25?f(y25[metric]):'n/a'}</td><td class="delta ${y25?dcls(val,y25[metric]):''}">${y25?delta(val,y25[metric]):'n/a'}</td>`}
function trendTable(){const rows=rowsForPeriod().slice().reverse();let html=`<div class="pills"><button onclick="period='weekly';render(DATA)" class="${period==='weekly'?'active':''}">Weekly</button><button onclick="period='monthly';render(DATA)" class="${period==='monthly'?'active':''}">Monthly</button></div><div class="tablewrap"><table class="table"><thead><tr><th>Period</th><th>Dates</th><th>Paid listings</th><th>25 paid</th><th>Δ</th><th>Total listings</th><th>25 total</th><th>Δ</th><th>Commission paid</th><th>25 comm.</th><th>Δ</th><th>Total revenue</th><th>25 revenue</th><th>Δ</th></tr></thead><tbody>`;for(const r of rows){const comm=(r.revenue_by_pkg&&r.revenue_by_pkg.commission)||0;const y25=r.same_period&&r.same_period['2025'];const c25=y25&&y25.revenue_by_pkg?y25.revenue_by_pkg.commission:null;html+=`<tr><td>${r.label}${r.partial?' *':''}</td><td>${r.range_label||((r.start||'')+'–'+(r.end||''))}</td><td>${fmt(r.package_ads)}</td>${compareCells(r,'package_ads')}<td>${fmt(r.total)}</td>${compareCells(r,'total')}<td>${sar(comm)}</td><td>${c25==null?'n/a':sar(c25)}</td><td class="delta ${c25!=null?dcls(comm,c25):''}">${c25!=null?delta(comm,c25):'n/a'}</td><td>${sar(r.revenue)}</td>${compareCells(r,'revenue',true)}</tr>`}return html+'</tbody></table></div><div class="note">* Partial period. Paid listings = عمولة + إعلان عادي + إعلان مميز + إعلان خاص. Total listings includes showroom/معرض. Total revenue = estimated عادي / مميز / خاص package revenue + paid commission amount from the commission listing report. 2025 LFL revenue uses historical pre-price-change package prices plus paid commission amounts from the 2025 commission report.</div>'}
function readout(){const r=period==='monthly'?DATA.monthly[DATA.monthly.length-1]:latestWeek(),y25=r.same_period&&r.same_period['2025'];const comm=(r.revenue_by_pkg&&r.revenue_by_pkg.commission)||0;return `${r.label}: paid listings ${fmt(r.package_ads)}, total listings ${fmt(r.total)}, commission paid ${sar(comm)}, total revenue ${sar(r.revenue)} · vs 2025 paid ${y25?delta(r.package_ads,y25.package_ads):'n/a'}, total ${y25?delta(r.total,y25.total):'n/a'}, revenue ${y25?delta(r.revenue,y25.revenue):'n/a'}`}
function render(data){DATA=data;const w=latestWeek();document.getElementById('reportDay').textContent='Live through: '+data.report_day;document.getElementById('subtitle').textContent=`Generated ${data.generated_at_ksa.replace('T',' ')} KSA · ${data.data_coverage}`;let html='';html+=`<section class="grid kpis">${metricCard('Paid listings',fmt(w.package_ads),'package_ads')}${metricCard('Total listings',fmt(w.total),'total')}${metricCard('Total revenue',sar(w.revenue),'revenue',true)}${runRateCard()}</section>`;html+=`<section class="card section"><h2>${period==='monthly'?'Monthly':'Weekly'} like-for-like comparison</h2><p class="readout">${readout()}</p>${trendTable()}</section>`;html+=`<section class="card section warning" style="margin-top:16px"><h2>Definition</h2><p class="note">Paid listings clubs the package types together: عمولة، إعلان عادي، إعلان مميز، إعلان خاص. Showroom is included only in total listings. Total revenue combines estimated individual package revenue with paid commission amounts from the commission listing report. Current pricing: Regular SAR 115 before 18 May 2026 and SAR 184 from 18 May; Special SAR 345 before 18 May 2026 and SAR 460 from 18 May; Private SAR 805. 2025 LFL revenue uses historical pre-price-change package prices, not the updated 2026 pricing. The annual run-rate card annualizes the combined revenue from the current data period and compares it with the total estimated 2025 revenue from 1 Jan to 31 Dec.</p></section>`;document.getElementById('app').className='';document.getElementById('app').innerHTML=html;document.getElementById('footer').textContent='Source: '+data.source+' · '+data.source_url}
fetch('data.json?ts='+Date.now()).then(r=>r.json()).then(render).catch(err=>{document.getElementById('app').innerHTML='Could not load data.json: '+err.message;});
</script>
</body>
</html>
